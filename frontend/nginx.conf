# Serves the built SPA. Two deployment shapes are supported:
#
#  1. Standalone (e.g. a Nebius endpoint / static host): the SPA is built with
#     VITE_API_URL pointing straight at the backend, so it calls the backend
#     cross-origin and the /api block below is never used.
#  2. Same-origin proxy (docker-compose): the SPA calls "/api/..." and nginx
#     reverse-proxies to the `backend` service, stripping the /api prefix.
#
# The /api upstream is referenced through a variable so nginx resolves it lazily
# at request time instead of at startup — otherwise nginx would refuse to boot
# wherever no `backend` host exists (the standalone case).
server {
    listen 80;
    root  /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS (compose). Harmless standalone — the /api path isn't hit.
    resolver 127.0.0.11 ipv6=off valid=30s;

    location /api/ {
        set $api_upstream "http://backend:8000";
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $api_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Builds/analysis are long-running background triggers, but responses are
        # quick; keep a generous timeout for the add-by-DOI / search endpoints.
        proxy_read_timeout 300s;
    }

    # SPA fallback — every non-file route serves index.html.
    location / {
        try_files $uri /index.html;
    }
}
