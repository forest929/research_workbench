# Serves the built SPA and reverse-proxies the API.
#
# The frontend calls "/api/projects/...". The trailing slash on proxy_pass makes
# nginx strip the "/api" prefix, so "/api/projects" -> "http://backend:8000/projects"
# — exactly what the Vite dev proxy does, so the frontend code needs no change.
#
# Change `backend` below to your backend Kubernetes Service name (e.g.
# backend.default.svc.cluster.local) or the backend host:port.
server {
    listen 80;
    root  /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Builds/analysis are long-running background triggers, but responses are
        # quick; keep a generous timeout for the add-by-DOI / search endpoints.
        proxy_read_timeout 300s;
    }

    # SPA fallback — every non-file route serves index.html.
    location / {
        try_files $uri /index.html;
    }
}
